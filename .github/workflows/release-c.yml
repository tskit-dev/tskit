name: Publish C API release

on:
  push:
    branches: [main, test]
    tags: ['*']

env:
  FORCE_COLOR: 1

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.10.0"
          enable-cache: false
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libcunit1-dev
      - name: Install meson
        run: uv tool install meson==1.10.1
      - name: Build tarball
        run: |
          git rm -rf c/tests/meson-subproject
          git config --global user.email "CI@CI.com"
          git config --global user.name "Mr Robot"
          git add -A
          git commit -m "dummy commit to make meson not add in the symlinked directory"
          meson c build-gcc
          meson dist -C build-gcc
      - name: C Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1 # zizmor: ignore[superfluous-actions] intentionally use the maintained release action rather than a bespoke gh release script
        if: startsWith(github.ref, 'refs/tags/') && contains(github.event.ref, 'C_')
        with:
          draft: True
          files: build-gcc/meson-dist/*
